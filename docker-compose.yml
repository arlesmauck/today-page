services:
  today-page:
    image: ghcr.io/arlesmauck/today-page:latest
    container_name: today-page
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LATITUDE: "39.7392"
      LONGITUDE: "-104.9903"
      LOCATION_NAME: "Denver, CO"
      REFRESH_INTERVAL: "900"
      DATA_DIR: "/app/data"
    volumes:
      - /mnt/tank/apps/today-page/data:/app/data
